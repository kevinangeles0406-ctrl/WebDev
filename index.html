<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Ball Animation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }


        #animation-container {
            width: 600px;
            height: 150px;
            border: 2px dashed #ccc;
            position: relative;
            margin-bottom: 20px;
            background-color: #fff;
        }


        #ball {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            left: 0px;
            top: 50px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h2>Hands-On Activity: Moving Ball Animation</h2>
    
    <div id-container id="animation-container">
        <div id="ball"></div>
    </div>

    <button id="startBtn">Start Animation</button>

    <script>

        const ball = document.getElementById('ball');
        const startBtn = document.getElementById('startBtn');

        let position = 0; 
        let animationInterval = null;

p
        function moveBall() {

            if (position >= 500) {
                clearInterval(animationInterval); 
                startBtn.disabled = false; 
                return;
            }


            position += 5;
            ball.style.left = position + 'px';
        }


        startBtn.addEventListener('click', function() {

            position = 0;
            ball.style.left = '0px';

            startBtn.disabled = true;

            animationInterval = setInterval(moveBall, 50);
        });
    </script>

</body>
</html>
